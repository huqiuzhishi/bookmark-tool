<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Quick Bookmarks</h1>
      <button id="addBtn" class="btn-add" title="Bookmark this page">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </header>

    <div id="addForm" class="add-form hidden">
      <div class="form-group">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" readonly>
      </div>
      <div class="form-group">
        <label for="urlInput">URL</label>
        <input type="text" id="urlInput" readonly>
      </div>
      <div class="form-group">
        <label for="notesInput">Notes</label>
        <textarea id="notesInput" placeholder="What's this page about?" rows="3"></textarea>
      </div>
      <div class="form-actions">
        <button id="cancelBtn" class="btn btn-secondary">Cancel</button>
        <button id="saveBtn" class="btn btn-primary">Save</button>
      </div>
    </div>

    <div class="search-container">
      <svg class="search-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search bookmarks..." autofocus>
    </div>

    <div id="bookmarkList" class="bookmark-list"></div>

    <div id="statusBar" class="status-bar hidden"></div>
  </div>

  <script src="storage.js"></script>
  <script src="search.js"></script>
  <script src="popup.js"></script>
</body>
</html>
